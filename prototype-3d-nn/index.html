<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Neural Network Visualization Prototype</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
</head>
<body>
  <div id="app">
    <header>
      <h1>3D Neural Network Visualization (Prototype)</h1>
      <div class="controls">
        <button id="playPauseBtn">Pause</button>
        <button id="viewToggleBtn">View: Combined</button>
        <label class="speedCtl">Speed
          <select id="speedSelect">
            <option value="0.5">0.5x</option>
            <option value="1" selected>1x</option>
            <option value="1.5">1.5x</option>
            <option value="2">2x</option>
            <option value="3">3x</option>
          </select>
        </label>
        <span class="status" id="statusText">Running</span>
        <span class="status" id="fpsCounter">FPS: --</span>
      </div>
    </header>
    <main>
      <div id="sceneContainer"></div>
      <div id="featureMapsContainer">
        <h2>Feature Maps</h2>
        <div id="inputVector" class="inputVec">Input: []</div>
        <div class="maps" id="mapsGrid"></div>
        <div class="output" id="outputValue"></div>
      </div>
    </main>
    <footer>
      <small>Prototype Step 1 — Hardcoded 3-3-1 network. Babylon.js</small>
    </footer>
  </div>

  <script type="module">
    import { Network } from './src/network.js';
    import { NNVisualizer } from './src/nnVisualizer.js';
    import { lerpColor } from './src/utils.js';

    const canvas = document.createElement('canvas');
    canvas.id = 'renderCanvas';
    document.getElementById('sceneContainer').appendChild(canvas);

    const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true, stencil: true });

    const network = new Network({
      inputSize: 3,
      hiddenSize: 3,
      outputSize: 1,
    });

    const inputVectorEl = document.getElementById('inputVector');

    const visualizer = new NNVisualizer(engine, network, {
      onHiddenActivation: (idx, value) => updateHiddenMap(idx, value),
      onOutputActivation: (value) => updateOutputValue(value),
      onNewInput: (vec) => updateInputVector(vec)
    });

    const mapsGrid = document.getElementById('mapsGrid');
    const outputValueEl = document.getElementById('outputValue');

    // Create feature map placeholders for hidden neurons
    for (let i = 0; i < network.hiddenSize; i++) {
      const cell = document.createElement('div');
      cell.className = 'mapCell';
      cell.id = `hidden-map-${i}`;
      cell.innerHTML = `<span>Hidden ${i}</span><div class="mapFill"></div>`;
      mapsGrid.appendChild(cell);
    }

    function updateHiddenMap(idx, value) {
      const cell = document.getElementById(`hidden-map-${idx}`);
      if (!cell) return;
      const fill = cell.querySelector('.mapFill');
      fill.style.background = lerpColor('#0044ff', '#ff2222', value);
      fill.style.filter = `brightness(${0.6 + value * 0.8})`;
      fill.title = value.toFixed(4);
    }

    function updateOutputValue(value) {
      outputValueEl.textContent = `Output: ${value.toFixed(4)}`;
      outputValueEl.style.color = lerpColor('#0044ff', '#ff2222', value);
    }

    function updateInputVector(vec){
      inputVectorEl.textContent = 'Input: [' + vec.map(v=>v.toFixed(3)).join(', ') + ']';
    }

    const playPauseBtn = document.getElementById('playPauseBtn');
    const viewToggleBtn = document.getElementById('viewToggleBtn');
  const statusText = document.getElementById('statusText');
  const speedSelect = document.getElementById('speedSelect');

    playPauseBtn.addEventListener('click', () => {
      if (visualizer.isRunning) {
        visualizer.pause();
        playPauseBtn.textContent = 'Play';
        statusText.textContent = 'Paused';
      } else {
        visualizer.play();
        playPauseBtn.textContent = 'Pause';
        statusText.textContent = 'Running';
      }
    });

    const viewModes = ['combined', 'nodes', 'maps'];
    let viewIdx = 0;
    viewToggleBtn.addEventListener('click', () => {
      viewIdx = (viewIdx + 1) % viewModes.length;
      const mode = viewModes(viewIdx);
      visualizer.setViewMode(mode);
      viewToggleBtn.textContent = `View: ${mode.charAt(0).toUpperCase() + mode.slice(1)}`;
    });

    speedSelect.addEventListener('change', () => {
      const mult = parseFloat(speedSelect.value);
      visualizer.setSpeed(mult);
    });

    window.addEventListener('resize', () => engine.resize());
    visualizer.start();
  </script>
</body>
</html>
