[pytest]
# Pytest configuration for WhyteBox

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Minimum version
minversion = 7.0

# Add options
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Show summary of all test outcomes
    -ra
    # Strict markers
    --strict-markers
    # Warnings
    -W error::DeprecationWarning
    -W error::PendingDeprecationWarning
    # Coverage
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    # Parallel execution (install pytest-xdist)
    # -n auto

# Markers for categorizing tests
markers =
    unit: Unit tests for individual functions
    integration: Integration tests for multiple components
    api: API endpoint tests
    slow: Tests that take a long time to run
    gpu: Tests that require GPU
    requires_model: Tests that require downloading models

# Coverage options
[coverage:run]
source = .
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */.venv/*
    */site-packages/*
    */examples/*
    */scripts/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

[coverage:html]
directory = htmlcov

